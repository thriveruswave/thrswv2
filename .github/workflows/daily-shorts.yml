name: Daily Auto Shorts with YouTube Upload

on:
  schedule:
   - cron: "0 0 * * *"       # 5:30 AM India time (12:00 AM UTC)
   - cron: "0 6 * * *"       # 11:30 AM India time (6:00 AM UTC)
   - cron: "0 12 * * *"      # 5:30 PM India time (12:00 PM UTC)
   - cron: "0 18 * * *"      # 11:30 PM India time (6:00 PM UTC)
  workflow_dispatch:
jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Cache Vosk Model
      uses: actions/cache@v3
      with:
        path: vosk-model-small-ru-0.22
        key: vosk-ru-model-${{ runner.os }}

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt

    - name: Check and generate topics if needed
      env:
        POLLINATIONS_API_KEY: ${{ secrets.POLLINATIONS_API_KEY }}
      run: |
        python generate_topics.py

    - name: Generate daily short video
      env:
        POLLINATIONS_API_KEY: ${{ secrets.POLLINATIONS_API_KEY }}
      run: |
        python main.py

    - name: Commit updated topics file
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add topics.txt
        git diff --staged --quiet || git commit -m "🔄 Auto-update: Remove used topic from queue [skip ci]"
        git push

    - name: Upload to all platforms
      env:
        # YouTube
        YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
        YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
        YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        # Instagram (optional)
        IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        IG_USER_ID: ${{ secrets.IG_USER_ID }}
        # TikTok (optional)
        TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
        # Facebook (optional)
        FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
        FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        # Threads (optional)
        THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
        # Twitter/X (optional)
        TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
        TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
        TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
        TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        # VK (optional)
        VK_ACCESS_TOKEN: ${{ secrets.VK_ACCESS_TOKEN }}
        VK_GROUP_ID: ${{ secrets.VK_GROUP_ID }}
      run: |
        python upload_all_platforms.py
